version: 1
service: python-service
description: Contract between Go service and Python agent for soul understanding, content generation, and chat.

base_url: /agent

endpoints:
  understand_soul:
    method: POST
    path: /agent/understand-soul
    request:
      user_id: string
      initial_prompt: string
      recent_chats: array
    response:
      user_id: string
      soul: string

  generate_content:
    method: POST
    path: /agent/generate-content
    request:
      user_id: string
      initial_prompt: string
      enhanced_profile: string
      preferences: object
      recent_chats: array
      limit: number
    response:
      items:
        - id: string
          type: string
          platform: string
          url: string
          title: string
          score: number
          metadata: object

  chat:
    method: POST
    path: /agent/chat
    request:
      user_id: string
      message: string
      initial_prompt: string
      enhanced_profile: string
      preferences: object
      recent_chats: array
    response:
      chat_response: string
      needs_new_content: boolean
