version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: dis-connect-frontend
    ports:
      - "3000:80"
    depends_on:
      - go-service
    environment:
      - VITE_API_BASE_URL=http://go-service:8080

  go-service:
    build: ./go-service
    container_name: dis-connect-go-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - python-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/dis_connect?sslmode=disable
      - REDIS_ADDR=redis:6379
      - AGENT_BASE_URL=http://python-service:8000

  python-service:
    build: ./python-service
    container_name: dis-connect-python-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  postgres:
    image: postgres:16-alpine
    container_name: dis-connect-postgres
    environment:
      - POSTGRES_DB=dis_connect
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dis-connect-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
